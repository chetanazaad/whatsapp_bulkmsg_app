<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulk Messages | WA Bulk Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="d-flex app-shell">
      <aside class="sidebar p-3" id="sidebar">
        <div class="d-flex align-items-center gap-2 mb-4 px-2">
          <i class="fa-brands fa-whatsapp text-success fs-4"></i>
          <span class="sidebar-brand">WA Bulk Pro</span>
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
          <a class="nav-link" href="devices.html"><i class="fa-solid fa-mobile-screen-button"></i>Devices</a>
          <a class="nav-link" href="single_message.html"><i class="fa-regular fa-paper-plane"></i>Single Message</a>
          <a class="nav-link active" href="bulk_messages.html"><i class="fa-solid fa-messages"></i>Bulk Messages</a>
          <a class="nav-link" href="templates.html"><i class="fa-solid fa-layer-group"></i>Templates</a>
          <a class="nav-link" href="contacts.html"><i class="fa-solid fa-address-book"></i>Contacts</a>
          <a class="nav-link" href="campaigns.html"><i class="fa-solid fa-bullhorn"></i>Campaigns</a>
          <a class="nav-link" href="ai_chatbot.html"><i class="fa-solid fa-robot"></i>AI Chatbot</a>
          <a class="nav-link" href="chatbot_flows.html"><i class="fa-solid fa-diagram-project"></i>Chatbot Flows</a>
          <a class="nav-link" href="warmer.html"><i class="fa-solid fa-fire"></i>Warmer</a>
          <a class="nav-link" href="reports.html"><i class="fa-solid fa-chart-pie"></i>Reports</a>
          <a class="nav-link" href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a>
        </nav>
      </aside>
      <div class="mobile-overlay" id="mobileOverlay"></div>
      <main class="content-wrap">
        <div class="topbar d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-secondary d-lg-none" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
            <div>
              <h5 class="mb-0 fw-semibold">Bulk Messages</h5>
              <small class="text-muted">Send custom or template-based messages at scale</small>
            </div>
          </div>
          <button class="btn btn-primary" data-toast="Bulk send simulated (hook backend later)." data-type="primary">
            <i class="fa-solid fa-paper-plane me-2"></i>Start Sending
          </button>
        </div>
        <section class="page-body">
          <div class="card card-soft mb-3">
            <div class="card-body">
              <div class="section-title">Message Configuration</div>
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Use Template (optional)</label>
                  <select class="form-select">
                    <option>No template (use custom)</option>
                    <option>Welcome_v3</option>
                    <option>Offer_April</option>
                    <option>Reminder_Booking</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Devices (minimum 1)</label>
                  <select class="form-select">
                    <option>Primary Device</option>
                    <option>Backup Device</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Messages (one per line)</label>
                  <textarea class="form-control" rows="5" placeholder="Hello, how are you?&#10;Let’s plan to meet..."></textarea>
                  <small class="text-muted">Each line will be treated as a separate outgoing message.</small>
                </div>
              </div>
            </div>
          </div>
          <div class="card card-soft">
            <div class="card-body">
              <div class="section-title">Sending Throttle</div>
              <div class="row g-3">
                <div class="col-md-4">
                  <label class="form-label">Min Delay (seconds)</label>
                  <input type="number" class="form-control" value="45" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Max Delay (seconds)</label>
                  <input type="number" class="form-control" value="90" />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Daily Limit</label>
                  <input type="number" class="form-control" value="500" />
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastHost"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
