<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings | WA Bulk Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div class="d-flex app-shell">
      <aside class="sidebar p-3" id="sidebar">
        <div class="d-flex align-items-center gap-2 mb-4 px-2">
          <i class="fa-brands fa-whatsapp text-success fs-4"></i>
          <span class="sidebar-brand">WA Bulk Pro</span>
        </div>
        <nav class="nav flex-column">
          <a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
          <a class="nav-link" href="contacts.html"><i class="fa-solid fa-address-book"></i>Contacts</a>
          <a class="nav-link" href="campaigns.html"><i class="fa-solid fa-bullhorn"></i>Campaign Builder</a>
          <a class="nav-link" href="templates.html"><i class="fa-solid fa-layer-group"></i>Templates</a>
          <a class="nav-link" href="reports.html"><i class="fa-solid fa-chart-pie"></i>Reports</a>
          <a class="nav-link active" href="settings.html"><i class="fa-solid fa-gear"></i>Settings</a>
        </nav>
      </aside>
      <div class="mobile-overlay" id="mobileOverlay"></div>
      <main class="content-wrap">
        <div class="topbar d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-outline-secondary d-lg-none" id="sidebarToggle"><i class="fa-solid fa-bars"></i></button>
            <div>
              <h5 class="mb-0 fw-semibold">Settings</h5>
              <small class="text-muted">Manage profile and WhatsApp API configuration</small>
            </div>
          </div>
        </div>
        <section class="page-body">
          <div class="row g-3">
            <div class="col-lg-7">
              <form id="settingsForm" class="card card-soft needs-validation" novalidate data-no-toast="true">
                <div class="card-body">
                  <div class="section-title">Profile</div>
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Full Name</label>
                      <input id="settingsFullName" class="form-control" value="Rohan Mehta" required />
                      <div class="invalid-feedback">Name is required.</div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input id="settingsEmail" class="form-control" type="email" value="rohan@wabulkpro.com" required />
                      <div class="invalid-feedback">Valid email required.</div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">WhatsApp Number</label>
                      <input id="settingsWhatsappNumber" class="form-control" value="+91 98765 43210" required />
                      <div class="invalid-feedback">WhatsApp number is required.</div>
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Timezone</label>
                      <select class="form-select" required>
                        <option>Asia/Kolkata (GMT+5:30)</option>
                        <option>UTC</option>
                        <option>America/New_York</option>
                      </select>
                    </div>
                    <div class="col-12">
                      <label class="form-label">API Key</label>
                      <div class="input-group">
                        <input class="form-control" id="apiKey" type="password" value="sk_live_4f3kj2k3jf98f0dj" required />
                        <button class="btn btn-outline-secondary" id="toggleApiKey" type="button"><i class="fa-solid fa-eye"></i></button>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="card-footer bg-white border-0 pb-4 px-4">
                  <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk me-2"></i>Save Changes</button>
                </div>
              </form>
            </div>
            <div class="col-lg-5">
              <div class="card card-soft">
                <div class="card-body">
                  <div class="section-title">Connection Health</div>
                  <div class="d-flex justify-content-between mb-2"><span>Token Status</span><span class="badge badge-soft-success">Active</span></div>
                  <div class="d-flex justify-content-between mb-2"><span>Last Sync</span><span class="text-muted">2 mins ago</span></div>
                  <div class="d-flex justify-content-between mb-3"><span>Webhook</span><span class="badge badge-soft-success">Verified</span></div>
                  <button class="btn btn-outline-primary w-100" data-toast="Webhook test ping sent." data-type="primary">
                    <i class="fa-solid fa-satellite-dish me-2"></i>Test Connection
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastHost"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
